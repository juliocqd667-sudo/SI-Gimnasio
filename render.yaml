services:
  # ─────────────────────────────────────────────────────────
  # SERVICIO UNIFICADO (DJANGO + VUE.JS)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: novafit-marioly
    env: python
    region: ohio
    plan: free
    rootDir: .
    buildCommand: "bash backend/build.sh"
    startCommand: "gunicorn --chdir backend gym_config.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: novafit-db-marioly
          property: connectionString
      - key: VITE_API_URL
        value: "https://novafit-marioly.onrender.com/api"

# ─────────────────────────────────────────────────────────
# BASE DE DATOS POSTGRESQL
# ─────────────────────────────────────────────────────────
databases:
  - name: novafit-db-marioly
    plan: free
    region: ohio
